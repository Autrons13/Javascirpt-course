<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas Pertemuan 2</title>
  </head>
  <body>
    <script>
      let nama = "Dodi Prayodi";
      let umur = "25 Tahun";
      let jabatan = "manajer";
      let status = "menikah";

      let gapok = 0;
      if (jabatan === "manajer") {
        gapok = 15000000;
      } else if (jabatan === "asisten manajer") {
        gapok = 10000000;
      } else if (jabatan == "staf") {
        gapok = 5000000;
      }

      let tunjabatan = 0.15 * gapok;
      let bpjs = 0.1 * gapok;

      let tunkeluarga = status === "menikah" ? 0.2 * gapok : 0;

      let totalgaji = gapok + tunjabatan + tunkeluarga + bpjs;

      const formatRupiah = (angka) => {
        return new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR" }).format(angka);
      };

      document.writeln(`
    <table border="1" cellpadding="10" cellspacing="0" style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>Nama Pegawai</th>
                <th>Umur</th>
                <th>Jabatan</th>
                <th>Status</th>
                <th>Gaji Pokok</th>
                <th>Tunjangan Jabatan</th>
                <th>BPJS</th>
                <th>Tunjangan Keluarga</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>${nama}</td>
                <td>${umur} Tahun</td>
                <td>${jabatan.charAt(0).toUpperCase() + jabatan.slice(1)}</td>
                <td>${status.charAt(0).toUpperCase() + status.slice(1)}</td>
                <td>${formatRupiah(gapok)}</td>
                <td>${formatRupiah(tunjabatan)}</td>
                <td>${formatRupiah(bpjs)}</td>
                <td>${formatRupiah(tunkeluarga)}</td>
            </tr>
        </tbody>
        <tfoot>
            <tr style="background-color: #f9f9f9; font-weight: bold;">
                <td colspan="7" style="text-align: center;">Total Gaji</td>
                <td>${formatRupiah(totalgaji)}</td>
            </tr>
        </tfoot>
    </table>
`);
    </script>
  </body>
</html>
